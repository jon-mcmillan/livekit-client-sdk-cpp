name: Build SDK (Linux distros)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.1)'
        required: true
        type: string
      ref:
        description: 'Git ref to build (tag, branch, or SHA). Leave empty for current branch.'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64-jammy
          - os: ubuntu-22.04-arm
            name: linux-arm64-jammy

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" || "$VERSION" == v* || "$VERSION" =~ [[:space:]] ]]; then
            echo "ERROR: Invalid version: '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SDK Version: $VERSION"

      - name: Install deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            llvm-dev libclang-dev clang \
            libva-dev libdrm-dev libgbm-dev libx11-dev libgl1-mesa-dev \
            libxext-dev libxcomposite-dev libxdamage-dev libxfixes-dev \
            libxrandr-dev libxi-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev \
            libssl-dev \
            libprotobuf-dev protobuf-compiler \
            libwayland-dev libdecor-0-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.name }}-cargo-reg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.name }}-cargo-reg-

      - name: Set build environment
        run: |
          CXXFLAGS="-Wno-deprecated-declarations"
          # GCC 11 on 22.04 doesn't have -Wno-changes-meaning (added in GCC 14).
          # WebRTC headers trigger "changes meaning of 'Network'" which -fpermissive
          # downgrades to a warning.
          if [[ "${{ matrix.os }}" == ubuntu-22.04* ]]; then
            CXXFLAGS="$CXXFLAGS -fpermissive"
          fi
          echo "CXXFLAGS=$CXXFLAGS" >> $GITHUB_ENV
          echo "CFLAGS=-Wno-deprecated-declarations" >> $GITHUB_ENV
          LLVM_VERSION=$(llvm-config --version | cut -d. -f1)
          echo "LIBCLANG_PATH=/usr/lib/llvm-${LLVM_VERSION}/lib" >> $GITHUB_ENV

      - name: Build and Bundle
        shell: bash
        run: |
          chmod +x build.sh
          version="${{ steps.version.outputs.version }}"
          # CMake project(VERSION) only accepts numeric versions (no -alpha.1 etc.)
          cmake_version="${version%%-*}"
          bundleDir="sdk-out/livekit-sdk-${{ matrix.name }}-${version}"
          ./build.sh release --version "$cmake_version" --bundle --prefix "$bundleDir"

          echo "Bundle contents:"
          find "$bundleDir" -type f | head -120

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: livekit-sdk-${{ matrix.name }}-${{ steps.version.outputs.version }}
          path: sdk-out/livekit-sdk-${{ matrix.name }}-${{ steps.version.outputs.version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Create release archives
        shell: bash
        run: |
          mkdir -p release-assets
          VERSION="${{ github.event.inputs.version }}"
          cd ${{ github.workspace }}/artifacts

          echo "Artifacts downloaded:"
          ls -la

          for dir in livekit-sdk-*-"${VERSION}"; do
            [[ -d "${dir}" ]] || continue
            echo "Creating tar.gz for ${dir}..."
            tar -czf "${{ github.workspace }}/release-assets/${dir}.tar.gz" "${dir}"
            echo "Created: ${dir}.tar.gz"
          done

      - name: List release assets
        run: ls -la ${{ github.workspace }}/release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: LiveKit C++ SDK v${{ github.event.inputs.version }} (Linux)
          draft: true
          files: ${{ github.workspace }}/release-assets/*
          body: |
            Linux distro builds of LiveKit C++ SDK v${{ github.event.inputs.version }}.

            Built from ref: `${{ github.event.inputs.ref || github.ref }}`

            | Artifact | Platform | glibc |
            |----------|----------|-------|
            | `livekit-sdk-linux-x64-jammy-${{ github.event.inputs.version }}.tar.gz` | Ubuntu 22.04 (ROS Humble) | <= 2.35 |
            | `livekit-sdk-linux-arm64-jammy-${{ github.event.inputs.version }}.tar.gz` | Ubuntu 22.04 arm64 (ROS Humble) | <= 2.35 |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
